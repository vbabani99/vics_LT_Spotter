<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Vics_LT_Spotter_v0.0.1.9</title>
  <style>
    :root{
      --bg:#050507;
      --bg2:#0b0d12;
      --panel:rgba(16,18,24,.78);
      --panel2:rgba(22,25,34,.92);
      --text:#f5f7fb;
      --muted:#9aa4b2;
      --line:rgba(255,255,255,.10);
      --accent:#8b5cf6;
      --accent2:#ec4899;
      --good:#22c55e;
      --bad:#ef4444;
      --mid:#facc15;
      --best:#a855f7;
      --radius:22px;
      --shadow:0 18px 40px rgba(0,0,0,.44);
      --glow:0 0 24px rgba(255,255,255,.05);
      --chip:#0f1117;
      --shine:rgba(255,255,255,.05);
    }
    body.theme-oled{
      --bg:#030303; --bg2:#090909; --panel:rgba(14,14,16,.78); --panel2:rgba(20,20,22,.92);
      --text:#f6f7fb; --muted:#a0a6b1; --line:rgba(255,255,255,.09);
      --accent:#8b5cf6; --accent2:#ec4899; --chip:#0b0b0c;
    }
    body.theme-carbon-red{
      --bg:#090607; --bg2:#130a0b; --panel:rgba(24,12,13,.80); --panel2:rgba(34,16,18,.93);
      --text:#fff3f3; --muted:#d7aaaa; --line:rgba(255,210,210,.11);
      --accent:#ef4444; --accent2:#fb923c; --chip:#180d0e;
    }
    body.theme-ice-blue{
      --bg:#061018; --bg2:#0b1823; --panel:rgba(10,23,34,.80); --panel2:rgba(17,33,46,.93);
      --text:#edf7ff; --muted:#a6c3d8; --line:rgba(220,245,255,.11);
      --accent:#38bdf8; --accent2:#60a5fa; --chip:#0a141c;
    }
    body.theme-neon-lime{
      --bg:#091107; --bg2:#11190d; --panel:rgba(16,23,13,.80); --panel2:rgba(23,32,19,.93);
      --text:#f7ffe9; --muted:#b8c59d; --line:rgba(240,255,214,.10);
      --accent:#84cc16; --accent2:#bef264; --chip:#10150d;
    }
    body.theme-sunset-orange{
      --bg:#130a07; --bg2:#1c110c; --panel:rgba(28,17,12,.80); --panel2:rgba(37,22,16,.93);
      --text:#fff4ec; --muted:#ddb29d; --line:rgba(255,231,217,.10);
      --accent:#f97316; --accent2:#fb923c; --chip:#170f0b;
    }
    body.theme-purple-night{
      --bg:#0d0816; --bg2:#170f24; --panel:rgba(20,13,31,.80); --panel2:rgba(28,19,42,.93);
      --text:#f7f1ff; --muted:#c1abdb; --line:rgba(245,235,255,.10);
      --accent:#a855f7; --accent2:#ec4899; --chip:#150f1e;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
    body{
      color:var(--text);
      background:
        radial-gradient(circle at 50% -10%, color-mix(in srgb, var(--accent) 30%, transparent), transparent 35%),
        radial-gradient(circle at 90% 100%, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 30%),
        linear-gradient(180deg,var(--bg2),var(--bg));
      transition:background .25s ease,color .25s ease;
    }
    body::before{
      content:"";
      position:fixed; inset:0; pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px),
        repeating-linear-gradient(135deg, rgba(255,255,255,.018) 0 2px, transparent 2px 8px);
      background-size: 22px 22px, 22px 22px, auto;
      mask-image: radial-gradient(circle at center, black 35%, transparent 82%);
      opacity:.22;
    }
    .app{
      width:min(100%, 520px);
      min-height:100vh;
      margin:0 auto;
      padding:calc(12px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));
      display:flex; flex-direction:column; gap:10px;
    }
    .shell,.main{
      background:
        linear-gradient(180deg,var(--panel2),var(--panel)),
        linear-gradient(180deg, var(--shine), transparent 45%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .shell{padding:10px 10px 12px}
    .topBrand{
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      margin-bottom:10px;
    }
    .brandLogo{
      width:204px; height:108px; object-fit:contain; display:block;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.34));
      border-radius:12px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.02);
      padding:2px;
    }
    .brandTag{
      text-align:center; font-weight:900; line-height:1.05;
      font-size:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
    }
    .brandLine{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      white-space:nowrap;
    }
    .brandTag small{
      display:block; color:var(--muted); font-size:11px; letter-spacing:.12em; text-transform:uppercase; margin-top:1px;
    }
    .liveRadio{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:2px 6px 2px 4px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      color:var(--muted);
      font-size:9px;
      font-weight:1000;
      letter-spacing:.08em;
      text-transform:uppercase;
      vertical-align:middle;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .liveRadio::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
      background:var(--bad);
      box-shadow:0 0 10px color-mix(in srgb, var(--bad) 70%, transparent);
    }
    .liveRadio.on{
      color:#eafff1;
      border-color:rgba(34,197,94,.45);
      background:rgba(34,197,94,.12);
    }
    .liveRadio.on::before{
      background:var(--good);
      box-shadow:0 0 12px color-mix(in srgb, var(--good) 78%, transparent);
    }
    .liveRadio.off{
      color:#ffe7e7;
      border-color:rgba(239,68,68,.44);
      background:rgba(239,68,68,.11);
    }
    .controlBar{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:6px;
      align-items:center;
    }
    .pill,.iconBtn,.voiceBtn,.pilotSelect{
      min-height:34px;
      border-radius:13px;
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%),
        var(--chip);
      color:var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .pill{
      min-width:58px; padding:0 9px; display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:900; letter-spacing:.10em; text-transform:uppercase;
    }
    .pill.on{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent}
    .pill.off{background:var(--chip); color:var(--muted)}
    .pilotSelect{
      width:100%;
      appearance:none; -webkit-appearance:none;
      padding:0 30px 0 11px; font-size:13px; font-weight:800; outline:none;
      background-image:
        linear-gradient(45deg,transparent 50%, #cbd5e1 50%),
        linear-gradient(135deg,#cbd5e1 50%, transparent 50%);
      background-position:calc(100% - 18px) 50%,calc(100% - 12px) 50%;
      background-size:5px 5px,5px 5px; background-repeat:no-repeat;
    }
    .voiceBtn{
      padding:0 10px; font-size:10px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
      min-width:72px;
    }
    .voiceBtn.on{background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff}
    .iconBtn{
      width:34px; min-width:34px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:900;
    }
    .themeHint{
      margin-top:8px;
      text-align:center;
      color:var(--muted);
      font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    }
    .voiceStatus{
      margin-top:8px;
      text-align:center;
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.10em;
      text-transform:uppercase;
      min-height:1.2em;
    }
    .voiceStatus.ok{color:var(--good)}
    .voiceStatus.warn{color:var(--mid)}
    .voiceStatus.bad{color:var(--bad)}
    .voiceSettings{
      margin-top:8px;
      display:grid;
      grid-template-columns: 1fr 104px;
      gap:8px;
      align-items:end;
    }
    .voiceField{
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    .voiceFieldLabel{
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      padding-left:2px;
    }
    .voiceSelect,.speedRange{
      width:100%;
      min-height:34px;
      border-radius:13px;
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%),
        var(--chip);
      color:var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      outline:none;
    }
    .voiceSelect{
      appearance:none; -webkit-appearance:none;
      padding:0 30px 0 11px;
      font-size:12px;
      font-weight:800;
      background-image:
        linear-gradient(45deg,transparent 50%, #cbd5e1 50%),
        linear-gradient(135deg,#cbd5e1 50%, transparent 50%);
      background-position:calc(100% - 18px) 50%,calc(100% - 12px) 50%;
      background-size:5px 5px,5px 5px;
      background-repeat:no-repeat;
    }
    .speedWrap{
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    .speedHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:6px;
      padding:0 2px;
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .speedValue{
      color:var(--text);
      font-size:11px;
      letter-spacing:.04em;
    }
    .speedRange{
      min-height:auto;
      padding:8px 10px;
      accent-color: var(--accent);
    }

    .main{
      flex:1;
      display:flex; flex-direction:column;
      justify-content:flex-start;
      padding:16px 14px 14px;
      position:relative;
      overflow:hidden;
    }
    .main::before{
      content:"";
      position:absolute; inset:auto -20% 50% -20%; height:140px;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--accent) 18%, transparent), transparent 65%),
        repeating-linear-gradient(135deg, rgba(255,255,255,.018) 0 2px, transparent 2px 7px);
      pointer-events:none;
      filter: blur(18px);
      opacity:.9;
    }
    .raceName{
      position:relative;
      text-align:center;
      font-size:clamp(18px,4.7vw,28px);
      line-height:1.08;
      font-weight:900;
      letter-spacing:.01em;
      margin:2px 0 10px;
    }
    .pilotName{
      position:relative;
      text-align:center;
      font-size:clamp(12px,3vw,16px);
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      min-height:1.25em;
      margin-bottom:6px;
    }
    .lapLabel{
      position:relative;
      text-align:center;
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.24em;
      text-transform:uppercase;
    }
    .lastLap{
      position:relative;
      text-align:center;
      font-size:clamp(64px,18vw,116px);
      line-height:.96;
      font-weight:1000;
      letter-spacing:-.05em;
      font-variant-numeric:tabular-nums;
      padding:8px 0 2px;
      text-shadow:var(--glow);
    }
    .lastLap.flash{animation:flash .55s ease-out}
    .lastLap.trend-good{color:var(--good)}
    .lastLap.trend-bad{color:var(--bad)}
    .lastLap.trend-mid{color:var(--mid)}
    .note{
      position:relative;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      min-height:1.3em;
      margin-bottom:10px;
    }
    .grid{
      position:relative;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:6px;
    }
    .metric{
      background:rgba(255,255,255,.02);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 12px;
      min-height:74px;
      display:flex; flex-direction:column; justify-content:space-between;
    }
    .metricLabel{
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
    }
    .metricValue{
      font-size:clamp(24px,6vw,34px);
      line-height:1;
      font-weight:1000;
      font-variant-numeric:tabular-nums;
    }
    .metricValue.small{font-size:clamp(22px,5.2vw,30px)}
    .metricValue.tiny{font-size:clamp(17px,4.3vw,24px); letter-spacing:-.035em}
    .metricValue.best{color:var(--best)}
    .footer{
      text-align:center;
      color:var(--muted);
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      padding:2px 0 0;
    }

    @keyframes flash{
      0%{transform:scale(1); opacity:.88}
      35%{transform:scale(1.06); opacity:1}
      100%{transform:scale(1); opacity:1}
    }

    @media (max-width:420px){
      .controlBar{grid-template-columns:1fr auto auto; gap:6px}
      .pill,.voiceBtn,.iconBtn,.pilotSelect,.voiceSelect{min-height:36px}
      .voiceBtn{min-width:74px; padding:0 10px; font-size:10px}
      .voiceSettings{grid-template-columns:1fr; gap:7px}
      .grid{gap:7px}
      .metric{min-height:68px; padding:9px 10px}
    }
  </style>
</head>

    <div class="footer">Vics LT Spotter</div>

  <script>
    const APP_NAME = 'Vics_LT_Spotter';
    const APP_VERSION = 'v0.0.1.9';
    const LS_PILOT = 'spotter_simple_lastlap_pilot_key';
    const LS_VOICE = 'spotter_simple_lastlap_voice_on';
    const LS_THEME = 'spotter_simple_lastlap_theme';
    const LS_VOICE_NAME = 'spotter_simple_lastlap_voice_name';
    const LS_VOICE_RATE = 'spotter_simple_lastlap_voice_rate';
    const THEMES = [
      { key:'theme-oled', label:'OLED' },
      { key:'theme-carbon-red', label:'Carbon Red' },
      { key:'theme-ice-blue', label:'Ice Blue' },
      { key:'theme-neon-lime', label:'Neon Lime' },
      { key:'theme-sunset-orange', label:'Sunset Orange' },
      { key:'theme-purple-night', label:'Purple Night' }
    ];

    const FIREBASE_CONFIG = {
      apiKey: 'AIzaSyBaySYvIxH8JsvXCETv3XwVdNecJY1ez2c',
      authDomain: 'turbo-racing-zround.firebaseapp.com',
      projectId: 'turbo-racing-zround',
      appId: '1:628478462576:web:c2dbc45c95bbe362ce42b5'
    };
    const FIRESTORE_DOC_PATH = 'races/currentRace';

    const els = {
      pilotSelect: document.getElementById('pilotSelect'),
      themeBtn: document.getElementById('themeBtn'),
      themeHint: document.getElementById('themeHint'),
      voiceBtn: document.getElementById('voiceBtn'),
      voiceSelect: document.getElementById('voiceSelect'),
      voiceStatus: document.getElementById('voiceStatus'),
      speedRange: document.getElementById('speedRange'),
      speedValue: document.getElementById('speedValue'),
      livePill: document.getElementById('livePill'),
      raceName: document.getElementById('raceName'),
      pilotName: document.getElementById('pilotName'),
      lastLap: document.getElementById('lastLap'),
      note: document.getElementById('note'),
      positionValue: document.getElementById('positionValue'),
      lapsValue: document.getElementById('lapsValue'),
      forecastValue: document.getElementById('forecastValue'),
      meanValue: document.getElementById('meanValue'),
      paceValue: document.getElementById('paceValue'),
      consistencyValue: document.getElementById('consistencyValue'),
      sigmaValue: document.getElementById('sigmaValue'),
      bestValue: document.getElementById('bestValue'),
      totalValue: document.getElementById('totalValue')
    };

    const state = {
      voiceOn: false,
      speechUnlocked: false,
      voiceName: '',
      voiceRate: 1.2,
      voiceReady: false,
      voiceProbeTimers: [],
      lastSpeakError: '',
      rows: [],
      selectedPilotKey: '',
      lastRenderedLapMs: null,
      lastSpokenText: '',
      voices: [],
      firebaseApp: null,
      firestore: null,
      unsubDoc: null,
      connected: false,
      wakeLock: null,
      wakeTick: null,
      pollTimer: null,
      lastSnapshotAt: 0,
      theme: 'theme-purple-night',
      pilotLapMemory: {},
      pilotTrendMemory: {}
    };

    function lsGet(key, fallback=''){ try { const v = localStorage.getItem(key); return v == null ? fallback : v; } catch { return fallback; } }
    function lsSet(key, value){ try { localStorage.setItem(key, value); } catch {} }
    function safeName(v){ return String(v || '').replace(/\s+/g, ' ').trim(); }
    function escapeHtml(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }

    function parseTimeToMs(v){
      if (v == null || v === '') return 0;
      if (typeof v === 'number' && Number.isFinite(v)) {
        if (v <= 0) return 0;
        if (v < 1000) return Math.round(v * 1000);
        return Math.round(v);
      }
      const s = String(v).trim();
      if (!s) return 0;
      if (/^\d+(\.\d+)?$/.test(s)) {
        const n = Number(s);
        if (!Number.isFinite(n) || n <= 0) return 0;
        if (n < 1000) return Math.round(n * 1000);
        return Math.round(n);
      }
      const m = s.match(/^(?:(\d+):)?(\d{1,2})(?:\.(\d{1,3}))?$/);
      if (!m) return 0;
      const min = Number(m[1] || 0);
      const sec = Number(m[2] || 0);
      const ms = Number((m[3] || '').padEnd(3, '0') || 0);
      return (min * 60000) + (sec * 1000) + ms;
    }

    function formatLapMs(ms){
      const n = Number(ms) || 0;
      if (n <= 0) return '--.--';
      const totalSec = Math.floor(n / 1000);
      const mins = Math.floor(totalSec / 60);
      const secs = totalSec % 60;
      const millis = n % 1000;
      if (mins > 0) return `${mins}:${String(secs).padStart(2,'0')}.${String(millis).padStart(3,'0')}`;
      return `${secs}.${String(millis).padStart(3,'0')}`;
    }

    function toNumber(v){
      if (v == null || v === '') return 0;
      if (typeof v === 'number' && Number.isFinite(v)) return v;
      const n = Number(String(v).replace('%','').replace(',','.').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function formatPercentValue(value){
      if (value == null || value === '') return '-';
      const raw = String(value).trim();
      if (!raw) return '-';
      if (raw.includes('%')) return raw;
      const n = toNumber(value);
      if (!Number.isFinite(n) || n <= 0) return '-';
      return `${n.toFixed(1)}%`;
    }

    function formatMsShort(ms){
      const n = Number(ms) || 0;
      if (n <= 0) return '-';
      if (n >= 1000) return formatLapMs(Math.round(n));
      return `${Math.round(n)} ms`;
    }

    function formatForecast(laps, ms){
      const l = Number(laps) || 0;
      const hasLaps = l > 0;
      const hasTime = Number(ms) > 0;
      if (hasLaps && hasTime) return `${l}L / ${formatLapMs(ms)}`;
      if (hasLaps) return `${l}L`;
      if (hasTime) return formatLapMs(ms);
      return '-';
    }

    function lapToSpeech(ms){
      const n = Number(ms) || 0;
      if (n <= 0) return '';
      const totalSec = Math.floor(n / 1000);
      const mins = Math.floor(totalSec / 60);
      const secs = totalSec % 60;
      const cent = Math.floor((n % 1000) / 10);
      if (mins > 0) return `${mins} minutos ${secs} segundos punto ${cent}`;
      return `${secs} punto ${cent}`;
    }

    function parsePosition(row, index){
      const rawPos = row.pos ?? row.position ?? row.rank ?? row.place ?? row.clasificacion ?? row.classificationPos ?? row.resultPos;
      const n = Number(rawPos);
      if (Number.isFinite(n) && n > 0) return Math.round(n);
      return (Number(index) || 0) + 1;
    }

    function extractRows(payload){
      const raw = payload && typeof payload === 'object' ? payload : {};
      const parsed = raw.parsed && typeof raw.parsed === 'object' ? raw.parsed : null;
      const rootRows = Array.isArray(raw.classification) ? raw.classification : [];
      const parsedRows = parsed && Array.isArray(parsed.classification) ? parsed.classification : [];
      const rows = parsedRows.length ? parsedRows : rootRows;
      return rows.map((row, index) => {
        const driverNumber = safeName(row.driverNumber || row.racerNumber || row.number || '');
        const driverName = safeName(row.driverName || row.racerName || row.name || row.pilotName || '');
        const lastLapMs = parseTimeToMs(row.lastLapMs ?? row.lastTimeMs ?? row.lastLapTimeMs ?? row.lastTime ?? row.lastLapTime ?? row.lastLap ?? 0);
        const bestLapMs = parseTimeToMs(row.bestMs ?? row.bestLapMs ?? row.bestTime ?? row.bestLapTime ?? row.best ?? row.bestLap ?? 0);
        const totalMs = parseTimeToMs(row.totalMs ?? row.time ?? row.totalTime ?? row.total ?? row.clockMs ?? row.clock ?? 0);
        const forecastMs = parseTimeToMs(row.estTimeMs ?? row.estTime ?? row.estTimeFmt ?? row.projectedTime ?? row.forecastTime ?? 0);
        const forecastLaps = Number(row.estLap ?? row.estLaps ?? row.projectedLaps ?? row.forecastLaps ?? row.predictedLaps ?? 0) || 0;
        const meanMs = parseTimeToMs(row.meanMs ?? row.meanTime ?? row.averageMs ?? row.avgMs ?? row.averageLapMs ?? row.avgLapMs ?? row.avgLapTime ?? row.media ?? 0);
        const paceMs = parseTimeToMs(row.paceMs ?? row.paceTime ?? row.ritmoMs ?? row.ritmo ?? 0);
        const consistencyRaw = row.consStr ?? row.consistencyStr ?? row.consPct ?? row.consistencyPct ?? row.consistency ?? row.cons ?? '';
        const sigmaMs = parseTimeToMs(row.sigmaMs ?? row.stdMs ?? row.stdDevMs ?? row.desvStdMs ?? 0);
        const sigmaRaw = row.sigmaStr ?? row.stdStr ?? row.stdDevStr ?? row.desvStdStr ?? '';
        const laps = Number(row.lapcount ?? row.laps ?? row.lapCount ?? row.lap ?? 0) || 0;
        const position = parsePosition(row, index);
        return {
          raw: row,
          index,
          position,
          key: `${driverNumber}__${driverName}`,
          driverNumber,
          driverName,
          label: driverNumber ? `${driverNumber} - ${driverName}` : driverName,
          lastLapMs,
          bestLapMs,
          totalMs,
          forecastMs,
          forecastLaps,
          meanMs,
          paceMs,
          consistencyRaw,
          sigmaMs,
          sigmaRaw,
          laps
        };
      }).filter(r => r.driverName);
    }

    function classifyTrend(currentMs, previousMs){
      const cur = Number(currentMs) || 0;
      const prev = Number(previousMs) || 0;
      if (cur <= 0 || prev <= 0) return '';
      const delta = cur - prev;
      if (delta <= -12) return 'good';
      if (delta >= 12) return 'bad';
      return 'mid';
    }

    function setTrendClass(trend){
      els.lastLap.classList.remove('trend-good','trend-bad','trend-mid');
      if (trend) els.lastLap.classList.add(`trend-${trend}`);
    }

    function currentThemeIndex(){
      const i = THEMES.findIndex(t => t.key === state.theme);
      return i >= 0 ? i : 0;
    }

    function applyTheme(themeName){
      const valid = THEMES.map(t => t.key);
      state.theme = valid.includes(themeName) ? themeName : 'theme-purple-night';
      document.body.className = state.theme;
      const meta = THEMES.find(t => t.key === state.theme);
      els.themeHint.textContent = meta ? meta.label : 'Theme';
      lsSet(LS_THEME, state.theme);
    }

    function cycleTheme(){
      const next = (currentThemeIndex() + 1) % THEMES.length;
      applyTheme(THEMES[next].key);
    }

    function setLive(ok, text){
      if (!els.livePill) return;
      els.livePill.textContent = ok ? 'LIVE' : (text || 'OFF');
      els.livePill.classList.toggle('on', !!ok);
      els.livePill.classList.toggle('off', !ok);
      els.livePill.setAttribute('aria-label', ok ? 'Conectado' : 'Sin conexión');
    }

    function setVoiceUi(){
      els.voiceBtn.textContent = state.voiceOn ? 'Voz ON' : 'Voz OFF';
      els.voiceBtn.classList.toggle('on', state.voiceOn);
    }

    function clampRate(v){
      const n = Number(v);
      if (!Number.isFinite(n)) return 1.2;
      return Math.max(1, Math.min(2.5, n));
    }

    function updateRateUi(){
      const rate = clampRate(state.voiceRate);
      state.voiceRate = rate;
      if (els.speedRange) els.speedRange.value = String(rate);
      if (els.speedValue) els.speedValue.textContent = `${rate.toFixed(1)}x`;
    }

    function setVoiceStatus(text, level='') {
      if (!els.voiceStatus) return;
      els.voiceStatus.textContent = text || '';
      els.voiceStatus.classList.remove('ok','warn','bad');
      if (level) els.voiceStatus.classList.add(level);
    }

    function speechAvailable(){
      return ('speechSynthesis' in window) && ('SpeechSynthesisUtterance' in window);
    }

    function sortVoiceList(list){
      return (list || []).slice().sort((a, b) => {
        const aLang = String(a.lang || '');
        const bLang = String(b.lang || '');
        const aScore = /^es(-|_)?MX/i.test(aLang) ? 0 : /^es/i.test(aLang) ? 1 : 2;
        const bScore = /^es(-|_)?MX/i.test(bLang) ? 0 : /^es/i.test(bLang) ? 1 : 2;
        if (aScore !== bScore) return aScore - bScore;
        return String(a.name || '').localeCompare(String(b.name || ''));
      });
    }

    function refreshVoicesNow(){
      if (!speechAvailable()) {
        state.voices = [];
        state.voiceReady = false;
        populateVoiceSelect();
        setVoiceStatus('Sin Web Speech: usa Chrome/Edge + TTS del sistema', 'bad');
        return [];
      }
      try {
        const list = window.speechSynthesis.getVoices() || [];
        state.voices = sortVoiceList(list);
        state.voiceReady = state.voices.length > 0;
        populateVoiceSelect();
        if (state.voiceReady) {
          const esCount = state.voices.filter(v => /^es/i.test(String(v.lang || ''))).length;
          setVoiceStatus(esCount ? `Voces listas: ${esCount} ES / ${state.voices.length}` : `Voces listas: ${state.voices.length}`, 'ok');
        } else {
          setVoiceStatus('Sin lista de voces: usando motor automático', 'warn');
        }
        return state.voices;
      } catch (err) {
        state.voices = [];
        state.voiceReady = false;
        populateVoiceSelect();
        setVoiceStatus('Error leyendo voces del sistema', 'bad');
        return [];
      }
    }

    function scheduleVoiceRefresh(){
      for (const t of state.voiceProbeTimers || []) { try { clearTimeout(t); } catch {} }
      state.voiceProbeTimers = [];
      const delays = [0, 120, 350, 800, 1600, 3000, 5200, 8000];
      for (const d of delays) {
        const timer = setTimeout(() => {
          const voices = refreshVoicesNow();
          if (voices.length && d >= 800) {
            for (const t of state.voiceProbeTimers || []) { try { clearTimeout(t); } catch {} }
            state.voiceProbeTimers = [];
          }
        }, d);
        state.voiceProbeTimers.push(timer);
      }
    }

    function populateVoiceSelect(){
      if (!els.voiceSelect) return;
      const current = state.voiceName || '';
      const voices = sortVoiceList(state.voices || []);
      const autoLabel = voices.length ? 'Voz automática' : 'Sistema automático (sin lista)';
      const options = [`<option value="">${escapeHtml(autoLabel)}</option>`];
      for (const v of voices) {
        const label = `${v.name || 'Sin nombre'} (${v.lang || 'sin idioma'})`;
        const selected = v.name === current ? ' selected' : '';
        options.push(`<option value="${escapeHtml(v.name || '')}"${selected}>${escapeHtml(label)}</option>`);
      }
      els.voiceSelect.innerHTML = options.join('');
      if (current && !voices.some(v => v.name === current)) {
        state.voiceName = '';
        lsSet(LS_VOICE_NAME, '');
        els.voiceSelect.value = '';
      } else {
        els.voiceSelect.value = state.voiceName || '';
      }
    }

    function populateSelect(rows){
      const wanted = state.selectedPilotKey || lsGet(LS_PILOT, '');
      const options = ['<option value="">Selecciona piloto</option>'];
      for (const r of rows) {
        const selected = r.key === wanted ? ' selected' : '';
        options.push(`<option value="${escapeHtml(r.key)}"${selected}>${escapeHtml(r.label)}</option>`);
      }
      els.pilotSelect.innerHTML = options.join('');
      state.selectedPilotKey = els.pilotSelect.value || '';
      if (!state.selectedPilotKey && rows.length === 1) {
        state.selectedPilotKey = rows[0].key;
        els.pilotSelect.value = rows[0].key;
      }
      updateSelectedPilotMeta();
    }

    function updateSelectedPilotMeta(){
      const row = state.rows.find(r => r.key === state.selectedPilotKey);
      els.pilotName.textContent = row ? row.driverName : 'Sin piloto';
      if (!row) {
        els.lastLap.textContent = '--.--';
        setTrendClass('');
        els.note.textContent = state.rows.length ? 'Selecciona un piloto' : 'Esperando datos...';
        els.positionValue.textContent = '-';
        els.lapsValue.textContent = '-';
        els.forecastValue.textContent = '-';
        els.meanValue.textContent = '-';
        els.paceValue.textContent = '-';
        els.consistencyValue.textContent = '-';
        els.sigmaValue.textContent = '-';
        els.bestValue.textContent = '-';
        els.totalValue.textContent = '-';
      }
    }

    function flashLastLap(){
      els.lastLap.classList.remove('flash');
      void els.lastLap.offsetWidth;
      els.lastLap.classList.add('flash');
    }

    function pickBestVoice(){
      const voices = state.voices.length ? state.voices : refreshVoicesNow();
      const selectedVoice = state.voiceName ? voices.find(v => v.name === state.voiceName) : null;
      return selectedVoice
        || voices.find(v => /^es(-|_)?MX/i.test(String(v.lang || '')))
        || voices.find(v => /^es/i.test(String(v.lang || '')))
        || voices[0]
        || null;
    }

    function speakText(text, opts={}){
      const force = !!opts.force;
      if ((!state.voiceOn && !force) || !text) return false;
      if (!speechAvailable()) {
        setVoiceStatus('Sin motor de voz en este navegador', 'bad');
        return false;
      }
      try {
        state.speechUnlocked = true;
        const synth = window.speechSynthesis;
        try { synth.resume && synth.resume(); } catch {}
        if (opts.interrupt !== false) { try { synth.cancel(); } catch {} }

        const u = new SpeechSynthesisUtterance(String(text));
        const pick = pickBestVoice();
        if (pick) u.voice = pick;
        u.lang = (pick && pick.lang) ? pick.lang : 'es-MX';
        u.rate = clampRate(state.voiceRate);
        u.pitch = 1.0;
        u.volume = 1.0;
        u.onstart = () => {
          state.lastSpeakError = '';
          setVoiceStatus(pick ? `Hablando: ${pick.lang || 'voz sistema'}` : 'Hablando: motor automático', 'ok');
        };
        u.onerror = (ev) => {
          state.lastSpeakError = ev && ev.error ? String(ev.error) : 'error';
          setVoiceStatus(`Fallo voz: ${state.lastSpeakError}`, 'bad');
        };
        u.onend = () => {
          if (!state.lastSpeakError) {
            setVoiceStatus(pick ? `Voz lista: ${pick.lang || 'sistema'}` : 'Voz lista: motor automático', 'ok');
          }
        };
        synth.speak(u);
        // Android/Huawei a veces deja el sintetizador pausado después del primer gesto. Reanudamos sin meter ruido.
        setTimeout(() => { try { synth.resume && synth.resume(); } catch {} }, 80);
        setTimeout(() => { try { synth.resume && synth.resume(); } catch {} }, 320);
        return true;
      } catch (err) {
        state.lastSpeakError = err && err.message ? err.message : 'error';
        setVoiceStatus('No pude lanzar la voz', 'bad');
        return false;
      }
    }

    async function unlockSpeech(){
      state.speechUnlocked = true;
      if (!speechAvailable()) {
        setVoiceStatus('Sin Web Speech en este entorno', 'bad');
        return false;
      }
      try {
        scheduleVoiceRefresh();
        window.speechSynthesis.resume && window.speechSynthesis.resume();
        return true;
      } catch {
        setVoiceStatus('No pude desbloquear voz', 'bad');
        return false;
      }
    }

    async function requestWakeLock(){
      if (!('wakeLock' in navigator) || document.hidden) return;
      try {
        if (state.wakeLock) return;
        state.wakeLock = await navigator.wakeLock.request('screen');
        state.wakeLock.addEventListener('release', () => { state.wakeLock = null; });
      } catch {}
    }

    function startKeepAlive(){
      if (state.wakeTick) clearInterval(state.wakeTick);
      state.wakeTick = setInterval(() => {
        if (!document.hidden) requestWakeLock();
      }, 15000);
      requestWakeLock();
    }

    async function onVoiceToggle(){
      state.voiceOn = !state.voiceOn;
      if (state.voiceOn) {
        await unlockSpeech();
        startKeepAlive();
      } else {
        try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch {}
      }
      lsSet(LS_VOICE, state.voiceOn ? '1' : '0');
      setVoiceUi();
      els.note.textContent = state.voiceOn ? 'Voz activa' : 'Voz apagada';
      if (state.voiceOn) {
        // Se habla dentro de la misma interacción. En móvil eso vale oro; el delay mata el desbloqueo.
        speakText('Spotter listo', { force:true, interrupt:true });
      }
    }

    function renderSelectedPilot(){
      const row = state.rows.find(r => r.key === state.selectedPilotKey);
      if (!row) return;

      const lapText = formatLapMs(row.lastLapMs);
      const prevLap = state.pilotLapMemory[row.key] || 0;
      const isNewLap = row.lastLapMs > 0 && row.lastLapMs !== prevLap;

      let trend = state.pilotTrendMemory[row.key] || '';
      if (isNewLap) {
        trend = classifyTrend(row.lastLapMs, prevLap);
        state.pilotTrendMemory[row.key] = trend || '';
      }

      els.pilotName.textContent = row.driverName;
      els.lastLap.textContent = lapText;
      setTrendClass(trend);

      els.positionValue.textContent = row.position > 0 ? `P${row.position}` : '-';
      els.lapsValue.textContent = row.laps > 0 ? String(row.laps) : '-';
      els.forecastValue.textContent = formatForecast(row.forecastLaps, row.forecastMs);
      els.meanValue.textContent = row.meanMs > 0 ? formatLapMs(row.meanMs) : '-';
      els.paceValue.textContent = row.paceMs > 0 ? formatLapMs(row.paceMs) : '-';
      els.consistencyValue.textContent = formatPercentValue(row.consistencyRaw);
      els.sigmaValue.textContent = row.sigmaMs > 0 ? formatMsShort(row.sigmaMs) : (row.sigmaRaw ? String(row.sigmaRaw).trim() : '-');
      els.bestValue.textContent = row.bestLapMs > 0 ? formatLapMs(row.bestLapMs) : '-';
      els.totalValue.textContent = row.totalMs > 0 ? formatLapMs(row.totalMs) : '-';

      if (trend === 'good') els.note.textContent = 'Mejor que la anterior';
      else if (trend === 'bad') els.note.textContent = 'Peor que la anterior';
      else if (trend === 'mid' && row.lastLapMs > 0 && prevLap > 0) els.note.textContent = 'En promedio';
      else els.note.textContent = row.lastLapMs > 0 ? 'Última lectura recibida' : 'Aún sin vuelta válida';

      if (isNewLap && row.lastLapMs !== state.lastRenderedLapMs) {
        flashLastLap();
        state.lastRenderedLapMs = row.lastLapMs;
      }

      if (isNewLap) {
        state.pilotLapMemory[row.key] = row.lastLapMs;
      }

      if (state.voiceOn && isNewLap && row.lastLapMs !== state.lastAnnouncedLapMs) {
        const speech = lapToSpeech(row.lastLapMs);
        if (speech && speech !== state.lastSpokenText) {
          state.lastSpokenText = speech;
          state.lastAnnouncedLapMs = row.lastLapMs;
          speakText(speech);
        }
      }
    }

    function applySnapshotData(data){
      const raceName = String((data && (data.raceName || (data.parsed && data.parsed.raceName) || '')) || '').trim();
      els.raceName.textContent = raceName || 'Sin carrera';

      const rows = extractRows(data || {});
      state.rows = rows;
      populateSelect(rows);
      setLive(true, rows.length ? 'LIVE' : 'LIVE');
      renderSelectedPilot();
    }

    function stopPolling(){
      try { if (state.pollTimer) clearInterval(state.pollTimer); } catch {}
      state.pollTimer = null;
    }

    async function pollCurrentRaceOnce(){
      try{
        if (!state.firestore) return;
        const snap = await state.firestore.doc(FIRESTORE_DOC_PATH).get({ source: 'default' });
        if (!snap.exists) {
          setLive(false, 'VACÍO');
          return;
        }
        state.connected = true;
        state.lastSnapshotAt = Date.now();
        applySnapshotData(snap.data() || {});
      }catch(err){
        console.error('pollCurrentRaceOnce', err);
      }
    }

    function disconnectFirestore(){
      try { if (state.unsubDoc) state.unsubDoc(); } catch {}
      state.unsubDoc = null;
      state.connected = false;
      stopPolling();
    }

    async function connectFirestore(){
      if (!window.firebase || !firebase.apps) {
        setLive(false, 'SDK');
        els.note.textContent = 'No cargó Firebase';
        return;
      }

      disconnectFirestore();
      stopPolling();

      try {
        const appName = `spotter-simple-lastlap-${FIREBASE_CONFIG.projectId}`;
        let app = firebase.apps.find(a => a.name === appName);
        if (!app) app = firebase.initializeApp(FIREBASE_CONFIG, appName);

        state.firebaseApp = app;
        state.firestore = firebase.firestore(app);

        try {
          state.firestore.settings({
            experimentalForceLongPolling: true,
            useFetchStreams: false
          });
        } catch {}

        const ref = state.firestore.doc(FIRESTORE_DOC_PATH);

        state.unsubDoc = ref.onSnapshot((snap) => {
          state.lastSnapshotAt = Date.now();
          if (!snap.exists) {
            setLive(false, 'VACÍO');
            els.note.textContent = 'El documento no existe';
            return;
          }
          state.connected = true;
          applySnapshotData(snap.data() || {});
          els.note.textContent = state.rows.length ? 'Recibiendo datos...' : 'Sin pilotos en feed';
        }, async (err) => {
          console.error('onSnapshot', err);
          setLive(false, 'RETRY');
          els.note.textContent = 'Snapshot falló, entro a polling';
          stopPolling();
          state.pollTimer = setInterval(() => {
            pollCurrentRaceOnce();
          }, 2500);
          await pollCurrentRaceOnce();
        });

        state.pollTimer = setInterval(() => {
          const age = Date.now() - (state.lastSnapshotAt || 0);
          if (!state.lastSnapshotAt || age > 6000) {
            pollCurrentRaceOnce();
          }
        }, 3000);

        setLive(true, 'LIVE');
        els.note.textContent = 'Esperando feed...';
      } catch (err) {
        console.error('connectFirestore', err);
        setLive(false, 'ERROR');
        els.note.textContent = 'No pude conectar Firebase';
      }
    }

    function primeVoiceFromFirstGesture(ev){
      if (ev && ev.target && ev.target.closest && ev.target.closest('#voiceBtn')) return;
      if (!state.voiceOn || state.speechUnlocked) return;
      unlockSpeech();
      speakText('Spotter listo', { force:true, interrupt:true });
    }

    function bindEvents(){
      els.voiceBtn.addEventListener('click', onVoiceToggle);
      els.themeBtn.addEventListener('click', cycleTheme);
      els.pilotSelect.addEventListener('change', () => {
        state.selectedPilotKey = els.pilotSelect.value || '';
        lsSet(LS_PILOT, state.selectedPilotKey);
        state.lastAnnouncedLapMs = null;
        state.lastSpokenText = '';
        renderSelectedPilot();
      });
      els.voiceSelect.addEventListener('change', () => {
        state.voiceName = els.voiceSelect.value || '';
        lsSet(LS_VOICE_NAME, state.voiceName);
        if (state.voiceOn) {
          els.note.textContent = state.voiceName ? 'Locutor actualizado' : 'Voz automática activa';
        }
      });
      els.speedRange.addEventListener('input', () => {
        state.voiceRate = clampRate(els.speedRange.value);
        updateRateUi();
      });
      els.speedRange.addEventListener('change', () => {
        state.voiceRate = clampRate(els.speedRange.value);
        updateRateUi();
        lsSet(LS_VOICE_RATE, String(state.voiceRate));
        if (state.voiceOn) els.note.textContent = `Velocidad ${state.voiceRate.toFixed(1)}x`;
      });
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && state.voiceOn) requestWakeLock();
      });
      ['pointerdown','touchstart','click'].forEach(ev => {
        document.addEventListener(ev, primeVoiceFromFirstGesture, { passive:true, capture:true });
      });
      if (speechAvailable()) {
        const refreshVoices = () => { refreshVoicesNow(); };
        refreshVoicesNow();
        scheduleVoiceRefresh();
        try { window.speechSynthesis.addEventListener('voiceschanged', refreshVoices); } catch {}
        try { window.speechSynthesis.onvoiceschanged = refreshVoices; } catch {}
      } else {
        populateVoiceSelect();
        setVoiceStatus('Sin Web Speech: no hay voz nativa', 'bad');
      }
    }

    async function init(){
      state.selectedPilotKey = lsGet(LS_PILOT, '');
      state.voiceOn = lsGet(LS_VOICE, '0') === '1';
      state.voiceName = lsGet(LS_VOICE_NAME, '');
      state.voiceRate = clampRate(lsGet(LS_VOICE_RATE, '1.2'));
      applyTheme(lsGet(LS_THEME, 'theme-purple-night'));
      setVoiceUi();
      updateRateUi();
      bindEvents();
      connectFirestore();
    }

    init();
  </script>
</body>
</html>
